<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Page Not Found</title>
    <style>
      :root {
        --primary: #1d1d1f;
        --secondary: #86868b;
        --accent: #0066cc;
        --bg: #ffffff;
      }

      body {
        background-color: var(--bg);
        color: var(--primary);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 650px;
        padding: 40px;
      }

      h1 {
        font-size: 9rem;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.05em;
        /* Subtle light-mode "ghost" effect */
        color: #f5f5f7;
        position: relative;
        z-index: 1;
      }

      .status-label {
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 1rem;
        display: block;
      }

      .description {
        position: relative;
        z-index: 2;
        margin-top: -3rem; /* Pulls text up into the 404 ghosting */
      }

      h2 {
        font-size: 2.5rem;
        margin: 0 0 1rem 0;
        font-weight: 600;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        color: var(--secondary);
      }

      .btn-group {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      .btn {
        color: #fff;
        background: var(--primary);
        padding: 12px 28px;
        text-decoration: none;
        border-radius: 40px;
        font-weight: 500;
        font-size: 0.95rem;
        transition: all 0.2s ease;
      }

      .btn-secondary {
        background: transparent;
        color: var(--primary);
        border: 1px solid #d2d2d7;
      }

      .btn:hover {
        opacity: 0.8;
        transform: translateY(-1px);
      }

      .btn-secondary:hover {
        background: #f5f5f7;
        border-color: #86868b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="status-label">Error Code 404</span>
      <h1>404</h1>

      <div class="description">
        <h2>Something’s missing.</h2>
        <p>
          The page you are looking for might have been removed, had its name
          changed, or is temporarily unavailable. It’s also possible there is a
          small typo in the URL.
        </p>

        <div class="btn-group">
          <a href="https://johnthecoda.is-a.dev/" class="btn">Return Home</a>
          <a href="javascript:history.back()" class="btn btn-secondary"
            >Go Back</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
