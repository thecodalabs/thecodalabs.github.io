<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Received | John The Coda</title>
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: -apple-system, system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }

      .content {
        opacity: 0;
        transform: scale(0.9);
        animation: zoomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes zoomIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      h1 {
        font-size: 3.5rem;
        letter-spacing: -0.04em;
        margin-bottom: 10px;
      }
      p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .back-home {
        color: #000;
        background: #fff;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: 600;
        transition: 0.3s;
      }

      .back-home:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Done.</h1>
      <p>Your message has reached my inbox.</p>
      <a href="index.html" class="back-home">Back to Home</a>
    </div>
  </body>
</html>
